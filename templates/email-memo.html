<!DOCTYPE html>
<!-- C-GEM Email / Partnership Memo Template · v2.0 -->
<!-- Use for: funder updates, partnership memos, programme briefs sent by email -->
<!-- Max-width 680px for email compatibility. Inline styles for email clients. -->
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title><!-- Memo title --></title>
  <style>
    body { margin:0; background:#f6f7f2; font-family:'Geist',system-ui,-apple-system,'Segoe UI',sans-serif; font-size:16px; color:#0e1410; -webkit-font-smoothing:antialiased; }
    .wrapper { max-width:680px; margin:0 auto; background:#ffffff; }
    .header { padding:32px 40px 24px; border-bottom:1px solid #e8e8e6; }
    .body { padding:40px; }
    .footer { padding:24px 40px; border-top:1px solid #e8e8e6; background:#f4f4ef; }
    h1 { font-size:28px; font-weight:500; letter-spacing:-0.025em; line-height:1.1; margin:0 0 12px; color:#0e1410; }
    h2 { font-size:20px; font-weight:500; letter-spacing:-0.02em; margin:32px 0 8px; color:#0e1410; }
    p { font-size:16px; line-height:1.65; color:#333333; margin:0 0 16px; }
    .eyebrow { font-family:'Geist Mono',ui-monospace,monospace; font-size:11px; text-transform:uppercase; letter-spacing:0.12em; color:#2c7a3d; font-weight:500; }
    .lede { font-size:18px; line-height:1.5; color:#333333; }
    .voice { font-family:'Newsreader',Georgia,serif; font-style:italic; font-weight:400; color:#265e30; }
    .stat-num { font-size:36px; font-weight:500; letter-spacing:-0.035em; line-height:1; font-variant-numeric:tabular-nums; color:#0e1410; }
    .stat-label { font-family:'Geist Mono',ui-monospace,monospace; font-size:11px; text-transform:uppercase; letter-spacing:0.1em; color:#2c7a3d; display:block; margin-top:4px; }
    .stat-row { display:flex; gap:40px; flex-wrap:wrap; background:#f4f4ef; padding:24px; margin:24px 0; }
    .btn { display:inline-block; background:#0e1410; color:#ffffff; text-decoration:none; padding:12px 20px; font-size:14px; font-weight:500; border-radius:4px; letter-spacing:-0.005em; }
    .programme-tag { display:inline-block; font-family:'Geist Mono',ui-monospace,monospace; font-size:10px; text-transform:uppercase; letter-spacing:0.08em; padding:3px 8px; border:1px solid currentColor; color:#2c7a3d; }
    .divider { height:1px; background:#e8e8e6; border:0; margin:24px 0; }
  </style>
</head>
<body>

<div class="wrapper">

  <!-- Header -->
  <div class="header">
    <img src="assets/logos/horizontal-black.png" alt="C-GEM" style="height:28px; margin-bottom:20px; opacity:0.85;">
    <div class="eyebrow" style="margin-bottom:8px;"><!-- Eyebrow, e.g. "Partnership Update · June 2026" --></div>
    <h1><!-- Memo headline --></h1>
    <p class="lede"><!-- 1-2 sentence intro --></p>
  </div>

  <!-- Body -->
  <div class="body">

    <!-- Stats block (optional — remove if not a data-heavy memo) -->
    <div class="stat-row">
      <div>
        <div class="stat-num">2,71,000</div>
        <span class="stat-label">Farming families</span>
      </div>
      <div>
        <div class="stat-num">5</div>
        <span class="stat-label">Verified projects</span>
      </div>
      <div>
        <div class="stat-num">14</div>
        <span class="stat-label">Indian states</span>
      </div>
    </div>

    <!-- Body sections -->
    <h2><!-- Section head --></h2>
    <p><!-- Body copy. First-person plural. Declarative. --></p>

    <!-- Voice quote (optional) -->
    <blockquote style="margin:24px 0; padding:16px 20px; border-left:3px solid #2c7a3d; background:#ecf5ee;">
      <p class="voice" style="margin:0 0 8px; font-size:18px;"><!-- Community voice quote --></p>
      <footer style="font-family:'Geist Mono',ui-monospace,monospace; font-size:10px; text-transform:uppercase; letter-spacing:0.1em; color:#888888;">— <!-- Name, location, year --></footer>
    </blockquote>

    <hr class="divider">

    <h2><!-- Section head --></h2>
    <p><!-- Body copy --></p>

    <!-- CTA -->
    <p style="margin-top:32px;">
      <a href="#" class="btn"><!-- CTA label --></a>
    </p>

    <!-- Triplet -->
    <p style="margin-top:32px; font-family:'Geist Mono',ui-monospace,monospace; font-size:11px; text-transform:uppercase; letter-spacing:0.12em; color:#0e1410;">
      Farmers First &nbsp;·&nbsp; Climate Always
    </p>

  </div>

  <!-- Footer -->
  <div class="footer">
    <p style="font-family:'Geist Mono',ui-monospace,monospace; font-size:10px; text-transform:uppercase; letter-spacing:0.1em; color:#888888; margin:0;">
      C-GEM · Eco-Value Empowerment Foundation<br>
      <!-- Contact / address line -->
    </p>
  </div>

</div>

</body>
</html>
