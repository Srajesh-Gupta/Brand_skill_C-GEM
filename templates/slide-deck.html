<!DOCTYPE html>
<!-- C-GEM Slide Deck Template · v2.0 -->
<!-- Navigation: Arrow keys or click next/prev. Press F for fullscreen. -->
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title><!-- Deck title --></title>
  <link rel="stylesheet" href="colors_and_type.css">
  <style>
    * { box-sizing: border-box; margin: 0; }
    body { background: #111; font-size: 16px; }
    .deck { width: 100vw; height: 100vh; position: relative; overflow: hidden; }
    .slide {
      position: absolute; inset: 0;
      display: none; flex-direction: column; justify-content: center;
      padding: clamp(40px, 6vw, 96px);
      background: var(--paper);
    }
    .slide.active { display: flex; }
    .slide--ink { background: var(--ink); color: var(--paper); }
    .slide--tonal { background: var(--paper-tonal); }
    .slide--cover { background: var(--ink); color: var(--paper); }

    /* Nav */
    .nav { position: fixed; bottom: 24px; right: 32px; display: flex; gap: 8px; z-index: 99; }
    .nav button { background: var(--ink); color: var(--paper); border: none; width: 40px; height: 40px; cursor: pointer; font-size: 18px; opacity: 0.7; }
    .nav button:hover { opacity: 1; }
    .slide-count { position: fixed; bottom: 28px; left: 32px; font-family: var(--font-meta); font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--ink-faint); }

    /* Slide type: two-column */
    .slide--two-col { display: none; flex-direction: row; align-items: center; gap: clamp(40px,6vw,80px); }
    .slide--two-col.active { display: flex; }
    .col { flex: 1; }

    /* Photo slide */
    .slide--photo { position: relative; }
    .slide--photo .photo-bg { position: absolute; inset: 0; background-size: cover; background-position: center; }
    .slide--photo .scrim { position: absolute; inset: 0; background: rgba(14,20,16,0.5); }
    .slide--photo .content { position: relative; z-index: 1; color: var(--paper); max-width: 720px; }
  </style>
</head>
<body>

<div class="deck">

  <!-- ── SLIDE 1: Cover ─────────────────────────────────── -->
  <div class="slide slide--cover active">
    <div class="triplet" style="margin-bottom:32px;">
      <span>People-centric</span><span>Tech-enabled</span><span>Planetary-scale</span>
    </div>
    <h1 style="font-size:var(--fs-display); color:var(--paper); letter-spacing:var(--tracking-display); line-height:0.92; max-width:14ch; margin-bottom:24px;">
      <!-- Deck title. Use <em class="voice" style="color:var(--sprout)"> for accent. -->
    </h1>
    <p style="font-size:18px; color:rgba(255,255,255,0.65); max-width:50ch;"><!-- Subtitle --></p>
    <div style="margin-top:auto; display:flex; align-items:center; justify-content:space-between;">
      <img src="assets/logos/horizontal-white.png" alt="C-GEM" style="height:28px;">
      <p class="footnote" style="color:rgba(255,255,255,0.4);"><!-- Date / event --></p>
    </div>
  </div>

  <!-- ── SLIDE 2: Stat slide ─────────────────────────────── -->
  <div class="slide">
    <div class="eyebrow" style="margin-bottom:24px;"><!-- Eyebrow --></div>
    <h2 style="font-size:var(--fs-h1); margin-bottom:40px;"><!-- Headline --></h2>
    <div style="display:flex; gap:64px; flex-wrap:wrap;">
      <div>
        <div class="stat">2,71,000 <span class="unit">families</span></div>
        <p class="footnote" style="margin-top:8px;">14 Indian states</p>
      </div>
      <div>
        <div class="stat">5 <span class="unit">projects</span></div>
        <p class="footnote" style="margin-top:8px;">Fully verified</p>
      </div>
    </div>
  </div>

  <!-- ── SLIDE 3: Two-column content ───────────────────── -->
  <div class="slide slide--two-col">
    <div class="col">
      <div class="eyebrow" style="margin-bottom:16px;"><!-- Eyebrow --></div>
      <h2 style="margin-bottom:16px;"><!-- Headline --></h2>
      <p class="lede"><!-- Body copy --></p>
      <ul style="margin-top:16px; padding-left:0; list-style:none;">
        <!-- List items: use <li style="padding:8px 0; border-bottom:1px solid var(--line);"> -->
      </ul>
    </div>
    <div class="col">
      <!-- Image, chart, or illustration -->
      <div style="aspect-ratio:4/3; background:var(--paper-card); display:flex; align-items:center; justify-content:center;">
        <p class="footnote">↑ Drop image</p>
      </div>
    </div>
  </div>

  <!-- ── SLIDE 4: Photo slide ───────────────────────────── -->
  <div class="slide slide--photo">
    <div class="photo-bg" style="background-image:url('assets/photography/farmer-field-school.jpg');"></div>
    <div class="scrim"></div>
    <div class="content">
      <div class="eyebrow" style="color:rgba(255,255,255,0.6); margin-bottom:16px;"><!-- Eyebrow --></div>
      <h2 style="color:var(--paper); font-size:var(--fs-h1); margin-bottom:16px;"><!-- Headline --></h2>
      <p class="voice" style="font-size:22px; color:rgba(255,255,255,0.85);"><!-- Quote --></p>
      <footer class="attribution" style="color:rgba(255,255,255,0.5); margin-top:12px;">— <!-- Attribution --></footer>
    </div>
  </div>

  <!-- ── SLIDE 5: Programme tile ────────────────────────── -->
  <div class="slide">
    <div class="eyebrow" style="margin-bottom:32px;">Programmes</div>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
      <div class="card" data-programme="ready" style="padding:24px;">
        <div class="eyebrow" style="color:var(--harvest); margin-bottom:8px;">Carbon Ready™</div>
        <p style="font-size:14px; margin:0;"><!-- 1-sentence description --></p>
      </div>
      <div class="card" data-programme="bridge" style="padding:24px;">
        <div class="eyebrow" style="margin-bottom:8px;">Carbon Bridge™</div>
        <p style="font-size:14px; margin:0;"></p>
      </div>
      <div class="card" data-programme="learn" style="padding:24px;">
        <div class="eyebrow" style="color:var(--leaf-600); margin-bottom:8px;">Climate Learn™</div>
        <p style="font-size:14px; margin:0;"></p>
      </div>
      <div class="card" data-programme="beyond" style="padding:24px;">
        <div class="eyebrow" style="color:var(--clay-600); margin-bottom:8px;">Beyond Carbon™</div>
        <p style="font-size:14px; margin:0;"></p>
      </div>
    </div>
  </div>

  <!-- ── SLIDE 6: Closing ───────────────────────────────── -->
  <div class="slide slide--ink">
    <div class="triplet" style="margin-bottom:32px;">
      <span>Farmers First</span><span>Climate Always</span>
    </div>
    <h2 style="color:var(--paper); font-size:var(--fs-h1); max-width:14ch; margin-bottom:32px;">
      <!-- Closing statement -->
    </h2>
    <a href="#" class="btn btn--leaf" style="width:fit-content;"><!-- CTA --></a>
    <div style="margin-top:auto;">
      <img src="assets/logos/horizontal-white.png" alt="C-GEM" style="height:24px; opacity:0.5;">
    </div>
  </div>

</div>

<!-- Navigation -->
<div class="nav">
  <button id="prev" title="Previous">←</button>
  <button id="next" title="Next">→</button>
</div>
<div class="slide-count" id="counter"></div>

<script>
  const slides = document.querySelectorAll('.slide');
  let cur = 0;
  function show(n) {
    slides[cur].classList.remove('active');
    cur = (n + slides.length) % slides.length;
    slides[cur].classList.add('active');
    document.getElementById('counter').textContent = (cur + 1) + ' / ' + slides.length;
  }
  document.getElementById('next').onclick = () => show(cur + 1);
  document.getElementById('prev').onclick = () => show(cur - 1);
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') show(cur + 1);
    if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') show(cur - 1);
    if (e.key === 'f' || e.key === 'F') document.documentElement.requestFullscreen?.();
  });
  show(0);
</script>
</body>
</html>
